<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/Estilos.css">
    <link href='https://cdn.boxicons.com/3.0.6/fonts/basic/boxicons.min.css' rel='stylesheet'>

    <title>Escolher perfil</title>
</head>

<body>
<div class="container">
    <div class="main" id="main">
        <div class="containerUsuarios">
            <div class="usuarios" id="listaUsuarios">

                <div class="addUsuario">
                    <a href="cadastrar.html"><i class="bx bx-plus"></i></a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    (function () {
        const perfis = JSON.parse(localStorage.getItem("perfis") || "[]");
        const lista = document.getElementById("listaUsuarios");
        const btnAdd = lista.querySelector(".addUsuario");

        perfis.forEach(function (perfil) {
            const card = document.createElement("div");
            card.className = "usuario-card";
            card.innerHTML = `
                <a href="dashboard.html" onclick="localStorage.setItem('usuarioLogado', JSON.stringify(${JSON.stringify(perfil)}))">
                    <div class="usuario">
                        ${perfil.imagem
                            ? `<img src="${perfil.imagem}" alt="${perfil.nome}">`
                            : `<i class="bx bx-user"></i>`
                        }
                    </div>
                    <span>${perfil.nome}</span>
                </a>
            `;
            lista.insertBefore(card, btnAdd);
        });

        if (perfis.length === 0) {
            const aviso = document.createElement("p");
            aviso.textContent = "Nenhum perfil salvo. Faça login ou cadastre-se.";
            aviso.style.cssText = "color: var(--text-muted, #888); font-size: 0.9rem; margin-bottom: 1rem;";
            lista.insertBefore(aviso, btnAdd);
        }
    })();
</script>
</body>

</html>
