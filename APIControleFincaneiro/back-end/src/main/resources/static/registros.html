    <script src="assets/boxicons/boxicons.js" onerror="var s=document.createElement('script');s.src='https://unpkg.com/boxicons@2.1.4/dist/boxicons.js';document.head.appendChild(s)"></script>
    <link href='assets/boxicons/boxicons.min.css' rel='stylesheet' id='bx-local'>
    <script>
        // Fallback: se icones locais nao carregarem, usa CDN
        (function(){
            function checkAndFallback(){
                var el = document.createElement('i');
                el.className = 'bx bx-check';
                el.style.cssText = 'position:fixed;top:-9999px;left:-9999px;font-size:20px;visibility:hidden';
                document.body.appendChild(el);
                var ff = window.getComputedStyle(el).fontFamily || '';
                document.body.removeChild(el);
                if(ff.toLowerCase().indexOf('boxicons') === -1){
                    var l = document.createElement('link');
                    l.rel = 'stylesheet';
                    l.href = 'https://cdn.boxicons.com/3.0.6/fonts/basic/boxicons.min.css';
                    document.head.appendChild(l);
                }
            }
            if(document.readyState === 'loading'){
                document.addEventListener('DOMContentLoaded', checkAndFallback);
            } else { checkAndFallback(); }
        })();
    </script>
    <title>Registros</title>
</head>
