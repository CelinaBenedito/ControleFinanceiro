spring.application.name=back-end

# ===== Integracao Python OFX Scraper =====
# URL base da API FastAPI que roda localmente
python.api.url=http://127.0.0.1:8000

# Diretorio do python-scraper.
# user.dir do IntelliJ aponta para a raiz do projeto (APIControleFinanceiro/),
# por isso o caminho correto e back-end/python-scraper.
# Se rodar de outro lugar, use o caminho ABSOLUTO com barras normais (/):
#   python.scraper.dir=C:/Users/celina.benedito/Documents/projetos/APIControleFincaneiro/back-end/python-scraper
python.scraper.dir=back-end/python-scraper

# Executavel Python. Se der erro 500 no /ofx/sessao/iniciar, use o caminho completo:
# python.scraper.executable=C:/Users/celina.benedito/AppData/Local/Programs/Python/Python314/python.exe
python.scraper.executable=python

# Timeout para o Python subir e passar no health check (segundos)
python.startup.timeout.seconds=30

# ===== Pasta OFX compartilhada =====
# Deve ser a mesma pasta configurada no OFX_OUTPUT_DIR do Python
ofx.output.dir=uploads/ofx
# Timeout aguardando arquivo aparecer na pasta apos scraping (segundos)
ofx.watcher.timeout.seconds=600

#Config para testes
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=true
spring.datasource.url=jdbc:h2:mem:teste;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8
server.error.include-message=always
springdoc.swagger-ui.operationsSorter=method

