spring.application.name=back-end

# =============================================
# Banco de dados embutido (MariaDB4j)
# Arquivos do banco ficam em ~/.myfinance/db
# Nao requer instalacao do MySQL.
# =============================================
app.database.embedded=true
app.database.port=13306
app.database.name=controle_financeiro

spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.defer-datasource-initialization=true

# Dialect explicito: evita query de metadados JDBC que falha com MySQL Connector/J + MariaDB
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

spring.main.headless=false
server.error.include-message=always
springdoc.swagger-ui.operationsSorter=method
