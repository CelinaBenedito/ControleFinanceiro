<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <link rel="icon" type="image/png" href="assets/glaceonIcon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações</title>
    <link href='https://cdn.boxicons.com/3.0.6/fonts/basic/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="styles/Estilos.css">
</head>

<body onload="carregarConfiguracoes()">
    <div class="containerGeral">
        <nav class="side-bar" id="navbar">
            <ul>
                <li onclick="sidebarFunction()">
                    <i class='bx  bx-menu-closer'></i>
                </li>
                <li>
                    <a href="dashboard.html"> <i class='bx  bx-home'></i> <span id="home">Home</span></a>
                </li>
                <li>
                    <a href="registros.html"> <i class='bx  bx-address-book'></i> <span id="reg"> Registros </span></a>
                </li>
                <li>
                    <a href="adicinarRegistros.html"> <i class='bx  bx-file-plus'></i> <span id="add">Adicionar
                            Registros</span></a>
                </li>
                <li>
                    <a href="agendaGastos.html"><i class='bx  bx-calendar-event'></i> <span
                            id="agenda">Agenda</span></a>
                </li>
                <li>
                    <a id="toggleTheme">
                        <span id="icone"><i class='bx bx-moon'></i></span>
                        <span id="tema">Tema</span>
                    </a> 
                </li>
                <li>
                    <a href="configurações.html"><i class='bx  bx-cog'></i> <span id="config">Configurações</span></a>
                </li>
            </ul>
        </nav>

        <div class="containerGeral">

            <main id="main" class="main">
                <h1>⚙️ Configurações</h1>

                <!-- MÊS FISCAL -->
                <div class="card">
                    <h2>Mês Fiscal</h2>

                    <div class="campo">
                        <select id="mesFiscal" required>
                            <option value="" disabled selected></option>
                            <option value="1">Dia 1</option>
                            <option value="5">Dia 5</option>
                            <option value="10">Dia 10</option>
                            <option value="15">Dia 15</option>
                        </select>
                        <label>Início do mês fiscal</label>
                    </div>

                    <button onclick="salvarConfiguracoes()">Salvar</button>
                </div>

                <!-- LIMITES DE GASTOS -->
                <div class="card">
                    <h2>Limites de Gastos</h2>

                    <div class="formulario">
                        <div class="campo">
                            <select required>
                                <option value="" disabled selected></option>
                                <option>Total Geral</option>
                                <option>Itaú</option>
                                <option>Nubank</option>
                            </select>
                            <label>Instituição</label>
                        </div>

                        <div class="campo">
                            <select required>
                                <option value="" disabled selected></option>
                                <option>Todas</option>
                                <option>Mercado</option>
                                <option>Roupas</option>
                                <option>Luz e Água</option>
                            </select>
                            <label>Categoria</label>
                        </div>

                        <div class="campo">
                            <input type="number" placeholder=" " id="ipt_limiteMensal" />
                            <label>Limite mensal (R$)</label>
                        </div>
                    </div>

                    <button>Salvar limite</button>
                </div>

                <!-- ALERTAS -->
                <div class="card">
                    <h2>Alertas de Limite</h2>

                    <div class="campo">
                        <label>
                            <input type="checkbox">
                            Receber alerta por WhatsApp
                        </label>
                    </div>

                    <div class="campo">
                        <label>
                            <input type="checkbox">
                            Receber alerta por Email
                        </label>
                    </div>

                    <button>Salvar alertas</button>
                </div>

                <!-- LIMPEZA DE DADOS -->
                <div class="card">
                    <h2>Limpeza de Dados</h2>

                    <button class="danger">
                        Apagar TODOS os registros
                    </button>

                    <div class="formulario">
                        <div class="campo">
                            <input type="date" placeholder=" ">
                            <label>Data inicial</label>
                        </div>

                        <div class="campo">
                            <input type="date" placeholder=" ">
                            <label>Data final</label>
                        </div>
                    </div>

                    <button class="secondary">
                        Apagar registros do período
                    </button>
                </div>

                <!-- INSTITUIÇÕES -->
                <div class="card">
                    <h2>Instituições Financeiras</h2>

                    <div class="campo">
                        <input type="text" placeholder=" " id="ipt_novaInstituicao">
                        <label>Nova instituição</label>
                    </div>

                    <button onclick="adicionarInstituicao()">Adicionar instituição</button>

                    <div class="lista" id="listaInstituicoes">
                    </div>
                </div>

                <!-- CATEGORIAS -->
                <div class="card">
                    <h2>Categorias</h2>

                    <div class="campo">
                        <input type="text" placeholder=" " id="ipt_novaCategoria">
                        <label>Nova categoria</label>
                    </div>

                    <button onclick="adicionarCategoria()">Adicionar categoria</button>

                    <div class="lista" id="listaCategorias">
                    </div>
                </div>

            </main>
        </div>
    </div>
</body>

</html>
<script src="js/navbar.js"></script>
<script src="js/configuracoes.js"></script>
